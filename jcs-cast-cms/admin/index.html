    <title>JCS Cast Admin</title>
    <style>
      body { font-family: Georgia, serif; background:#111; color:#f5f0e8; margin:0; }

  <body>
    <div class="wrap">
      <h1>Jesus Christ Superstar Cast Admin</h1>
      <div class="note">

      </div>
    </div>
